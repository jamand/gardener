apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - patch: |
      # The spec here must match the respective fields in the Shoot object for the self-hosted cluster:
      # /dev-setup/gardenadm/resources/base/shoot.yaml
      - op: replace
        path: /spec/runtimeCluster/networking/nodes
        value:
        - 172.18.0.0/24
      - op: replace
        path: /spec/runtimeCluster/networking/pods
        value:
        - 10.3.0.0/16
      - op: replace
        path: /spec/runtimeCluster/networking/services
        value:
        - 10.4.0.0/16
      - op: remove
        path: /spec/runtimeCluster/provider/zones
      # Publish kube-public/cluster-info on the virtual garden so `gardenadm connect`
      # can verify the CA via --discovery-token-ca-cert-hash without a pre-shared CA bundle.
      # Also wire up the path-scoped anonymous AuthenticationConfiguration so that the
      # discovery endpoints are accessible without credentials.
      - op: add
        path: /spec/virtualCluster/kubernetes/kubeAPIServer
        value:
          enableBootstrapDiscovery: true
          structuredAuthentication:
            configMapName: gardenadm-anonymous-auth
    target:
      group: operator.gardener.cloud
      kind: Garden
      name: local
